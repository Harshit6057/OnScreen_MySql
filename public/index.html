<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f13;
      overflow: hidden;
    }

    /* Animated background blobs */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .blob-1 { width: 500px; height: 500px; background: #6c63ff; top: -100px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: #ff6584; bottom: -80px; right: -80px; animation-delay: 3s; }
    .blob-3 { width: 300px; height: 300px; background: #43e97b; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: 6s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(30px, 20px) scale(1.08); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      margin: 1rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 48px 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
    }

    .logo {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, #6c63ff, #43e97b);
      border-radius: 14px;
      margin-bottom: 28px;
      display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 24px; height: 24px; fill: #fff; }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }
    .subtitle {
      margin-top: 6px;
      font-size: 0.875rem;
      color: rgba(255,255,255,0.45);
    }

    form { margin-top: 32px; display: flex; flex-direction: column; gap: 18px; }

    .field { display: flex; flex-direction: column; gap: 7px; }

    label {
      font-size: 0.8rem;
      font-weight: 500;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.3px;
    }

    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap svg {
      position: absolute;
      left: 14px;
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.3);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
      transition: stroke 0.2s;
    }

    input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    input::placeholder { color: rgba(255,255,255,0.2); }
    input:focus {
      border-color: #6c63ff;
      background: rgba(108,99,255,0.08);
      box-shadow: 0 0 0 3px rgba(108,99,255,0.18);
    }
    input:focus + svg, .input-wrap:focus-within svg { stroke: #6c63ff; }

    /* password toggle */
    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
    }
    .toggle-pw svg {
      position: static;
      width: 16px; height: 16px;
      stroke: rgba(255,255,255,0.3);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s;
    }
    .toggle-pw:hover svg { stroke: rgba(255,255,255,0.7); }

    /* password strength */
    .strength-bar {
      display: flex; gap: 4px; margin-top: 6px;
    }
    .strength-bar span {
      flex: 1; height: 3px; border-radius: 99px;
      background: rgba(255,255,255,0.1);
      transition: background 0.3s;
    }
    .strength-label {
      font-size: 0.72rem;
      color: rgba(255,255,255,0.35);
      margin-top: 4px;
    }

    /* terms */
    .terms {
      display: flex; align-items: flex-start; gap: 10px;
      font-size: 0.8rem; color: rgba(255,255,255,0.4);
    }
    .terms input[type=checkbox] {
      width: 16px; height: 16px; padding: 0;
      accent-color: #6c63ff;
      flex-shrink: 0; margin-top: 1px;
    }
    .terms a { color: #6c63ff; text-decoration: none; }
    .terms a:hover { text-decoration: underline; }

    /* submit */
    button[type=submit] {
      margin-top: 4px;
      padding: 14px;
      background: linear-gradient(135deg, #6c63ff, #5a52e0);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(108,99,255,0.35);
    }
    button[type=submit]:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 12px 32px rgba(108,99,255,0.45); }
    button[type=submit]:active { transform: translateY(0); }
    button[type=submit]:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* spinner inside button */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* toast */
    .toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 12px 22px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.success { background: #1a9e5c; }
    .toast.error   { background: #c0392b; }

    .signin {
      text-align: center;
      margin-top: 24px;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.35);
    }
    .signin a { color: #6c63ff; text-decoration: none; }
    .signin a:hover { text-decoration: underline; }

    /* field error */
    .field-error {
      font-size: 0.75rem;
      color: #ff6b6b;
      margin-top: 2px;
      display: none;
    }
    .field.invalid .field-error { display: block; }
    .field.invalid input { border-color: #ff6b6b; }
  </style>
</head>
<body>

<div class="bg">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
  </div>
  <h1>Create account</h1>
  <p class="subtitle">Join us today — it only takes a minute.</p>

  <form id="regForm" novalidate>

    <div class="field" id="field-name">
      <label for="fullname">Full name</label>
      <div class="input-wrap">
        <input type="text" id="fullname" name="fullname" placeholder="Jane Doe" autocomplete="name" required/>
        <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      </div>
      <span class="field-error">Please enter your full name.</span>
    </div>

    <div class="field" id="field-email">
      <label for="email">Email address</label>
      <div class="input-wrap">
        <input type="email" id="email" name="email" placeholder="jane@example.com" autocomplete="email" required/>
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
      </div>
      <span class="field-error">Enter a valid email address.</span>
    </div>

    <div class="field" id="field-password">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Min. 8 characters" autocomplete="new-password" required/>
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <button type="button" class="toggle-pw" id="togglePw" aria-label="Toggle password visibility">
          <svg id="eyeIcon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
      </div>
      <div class="strength-bar">
        <span id="s1"></span><span id="s2"></span><span id="s3"></span><span id="s4"></span>
      </div>
      <div class="strength-label" id="strengthLabel"></div>
      <span class="field-error">Password must be at least 8 characters.</span>
    </div>

    <div class="terms">
      <input type="checkbox" id="terms" required/>
      <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
    </div>

    <button type="submit" id="submitBtn">Create account</button>
  </form>

  <p class="signin">Already have an account? <a href="#">Sign in</a></p>
</div>

<div class="toast" id="toast"></div>

<script>
  // Password visibility toggle
  const pwInput = document.getElementById('password');
  const togglePw = document.getElementById('togglePw');
  const eyeIcon = document.getElementById('eyeIcon');

  togglePw.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  // Password strength
  pwInput.addEventListener('input', () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;

    const colors = ['', '#e74c3c', '#e67e22', '#f1c40f', '#2ecc71'];
    const labels = ['', 'Weak', 'Fair', 'Good', 'Strong'];
    for (let i = 1; i <= 4; i++) {
      document.getElementById('s' + i).style.background =
        i <= score ? colors[score] : 'rgba(255,255,255,0.1)';
    }
    document.getElementById('strengthLabel').textContent = v.length ? labels[score] : '';
    document.getElementById('strengthLabel').style.color = colors[score];
  });

  // Toast helper
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => { t.className = 'toast ' + type; }, 3500);
  }

  // Validate field
  function validate(id, condition) {
    const field = document.getElementById('field-' + id);
    if (!condition) { field.classList.add('invalid'); return false; }
    field.classList.remove('invalid'); return true;
  }

  // Form submit — POST to backend, credentials never touch the client
  document.getElementById('regForm').addEventListener('submit', async (e) => {
    e.preventDefault();

    const fullname = document.getElementById('fullname').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const terms    = document.getElementById('terms').checked;

    const v1 = validate('name',     fullname.length > 1);
    const v2 = validate('email',    /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email));
    const v3 = validate('password', password.length >= 8);
    if (!v1 || !v2 || !v3) return;
    if (!terms) { showToast('Please accept the terms to continue.', 'error'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Creating account…';

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        // Only user-entered data is sent — NO credentials ever leave the server
        body: JSON.stringify({ fullname, email, password })
      });

      const data = await res.json();

      if (res.ok) {
        showToast('Account created successfully!', 'success');
        document.getElementById('regForm').reset();
        document.querySelectorAll('.strength-bar span').forEach(s => s.style.background = '');
        document.getElementById('strengthLabel').textContent = '';
      } else {
        showToast(data.error || 'Something went wrong.', 'error');
      }
    } catch {
      showToast('Network error. Please try again.', 'error');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Create account';
    }
  });
</script>
</body>
</html>
